name: Docker Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build, for example "device-gateway-go v0.1.0"
        required: true
        type: string
      prerelease:
        description: Treat as prerelease and skip the latest tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release target
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          PRERELEASE: ${{ github.event.release.prerelease || inputs.prerelease }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          if [[ "$RELEASE_TAG" =~ ^(device-gateway-go|agent-gateway-go)[[:space:]_/-]+(.+)$ ]]; then
            service="${BASH_REMATCH[1]}"
            version="${BASH_REMATCH[2]}"
          else
            echo "::notice::Release tag '$RELEASE_TAG' does not target a gateway Docker image."
            {
              echo "should_build=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "$version" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Release version '$version' is not a valid Docker tag."
            exit 1
          fi

          owner="$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/${service}"

          tags="${image}:${version}"
          # Optional Docker Hub publishing:
          # dockerhub_image="lobehub/${service}"
          # tags="${tags}"$'\n'"${dockerhub_image}:${version}"
          if [[ "$PRERELEASE" != "true" ]]; then
            tags="${tags}"$'\n'"${image}:latest"
            # Optional Docker Hub publishing:
            # tags="${tags}"$'\n'"${dockerhub_image}:latest"
          fi

          {
            echo "should_build=true"
            echo "service=${service}"
            echo "version=${version}"
            echo "image=${image}"
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.release.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.release.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Login to Docker Hub
      #   if: steps.release.outputs.should_build == 'true'
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.release.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.release.outputs.service }}
          file: ./${{ steps.release.outputs.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.release.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.title=${{ steps.release.outputs.service }}
