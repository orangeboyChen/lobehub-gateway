name: Docker Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      gateway:
        description: Gateway image to build
        required: true
        type: choice
        options:
          - device-gateway-go
          - agent-gateway-go
      version:
        description: Release version to build, for example "v0.1.0"
        required: true
        type: string
      prerelease:
        description: Treat as prerelease and skip the latest tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release target
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          MANUAL_GATEWAY: ${{ inputs.gateway }}
          MANUAL_VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ github.event.release.prerelease || inputs.prerelease }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            service="$MANUAL_GATEWAY"
            version="$MANUAL_VERSION"
            checkout_ref="${service}-${version}"
          elif [[ "$RELEASE_TAG" =~ ^(device-gateway-go|agent-gateway-go)[[:space:]_/-]+(.+)$ ]]; then
            service="${BASH_REMATCH[1]}"
            version="${BASH_REMATCH[2]}"
            checkout_ref="$RELEASE_TAG"
          else
            echo "::notice::Release tag '$RELEASE_TAG' does not target a gateway Docker image."
            {
              echo "should_build=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "$version" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Release version '$version' is not a valid Docker tag."
            exit 1
          fi

          owner="$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/${service}"

          tags="${image}:${version}"
          dockerhub_enabled=false
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            dockerhub_enabled=true
            dockerhub_image="lobehub/${service}"
            tags="${tags}"$'\n'"${dockerhub_image}:${version}"
          elif [[ -n "$DOCKERHUB_USERNAME" || -n "$DOCKERHUB_TOKEN" ]]; then
            echo "::notice::Docker Hub publishing is skipped because one of DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is missing."
          fi

          if [[ "$PRERELEASE" != "true" ]]; then
            tags="${tags}"$'\n'"${image}:latest"
            if [[ "$dockerhub_enabled" == "true" ]]; then
              tags="${tags}"$'\n'"${dockerhub_image}:latest"
            fi
          fi

          {
            echo "should_build=true"
            echo "dockerhub_enabled=${dockerhub_enabled}"
            echo "service=${service}"
            echo "version=${version}"
            echo "image=${image}"
            echo "checkout_ref=${checkout_ref}"
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.release.outputs.should_build == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        if: steps.release.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.release.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.release.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.release.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.release.outputs.service }}
          file: ./${{ steps.release.outputs.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.release.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.title=${{ steps.release.outputs.service }}
